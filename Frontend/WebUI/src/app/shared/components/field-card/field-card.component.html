<div class="d-flex bg-white rounded-4 shadow-sm overflow-hidden h-100 transition-hover" 
     style="border: 1px solid var(--border-input);">
  
  <!-- Sol: Resim (Şimdilik Gri Kutu veya Placeholder) -->
  <div style="width: 220px; min-width: 220px; background-color: #e5e7eb; display: flex; align-items: center; justify-content: center;">
    <i *ngIf="!field.imageUrl" class="ki-duotone ki-picture text-muted" style="font-size: 3rem;"></i>
    <img *ngIf="field.imageUrl" [src]="field.imageUrl" class="w-100 h-100" style="object-fit: cover;" alt="Saha Resmi">
  </div>
  
  <!-- Sağ: Bilgiler -->
  <div class="p-4 d-flex flex-column flex-grow-1 position-relative">
    
    <!-- <div class="position-absolute top-0 end-0 p-3">
       <i class="ki-duotone ki-star text-success fs-5"></i>
    </div> -->

    <!-- DB'den gelen gerçek veriler -->
    <h5 class="fw-bold mb-2 pe-4" style="color: var(--text-dark);">{{ field.name }}</h5>
    <div class="small mb-4 d-flex align-items-center fw-medium" style="color: var(--text-muted);">
    
</div>
    
    <div class="mt-auto">
      <button
    class="btn rounded-pill fw-semibold px-4 py-2"
    style="background:#000;color:#fff;">

    Hemen İncele

    <i class="bi bi-arrow-right ms-2"></i>

</button>
    </div>
  </div>
</div>
