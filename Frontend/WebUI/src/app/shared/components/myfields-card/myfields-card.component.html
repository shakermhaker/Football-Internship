<div class="card h-100 shadow-sm rounded-4 field-card custom-card-bg">
  <div class="card-body p-4 d-flex flex-column">
    
    <!-- BAŞLIK VE DURUM -->
    <div class="d-flex justify-content-between align-items-start mb-3">
      <!-- DİKKAT: field.name yerine field.fieldName yazdık! -->
      <h4 class="card-title fw-bold mb-0" style="color: #2b3445;">{{ field.fieldName }}</h4>
    </div>
    
    <!-- DÜZENLE BUTONU -->
    <div class="d-flex gap-3 mt-auto">
      <!-- flex-grow-1: İki butonun da alanı eşit paylaşmasını sağlar -->
      <button class="btn flex-grow-1 fw-bold edit-btn" (click)="editClick()">
        <i class="me-1">✏️</i> Düzenle
      </button>

      <button class="btn flex-grow-1 fw-bold delete-btn" (click)="deleteClick()">
        <i class="me-1">🗑️</i> Sil
      </button>
    </div>

  </div>
</div>
