<div class="d-flex flex-column gap-7 gap-lg-10 d-flex align-items-center">
  

  <div class="card shadow-sm border-0 " style="width: 60rem;">
    <div class="card-body p-9">
      <div class="d-flex flex-wrap flex-sm-nowrap align-items-center">
        
        <div class="me-7 mb-4 mb-sm-0">
          <div class="symbol symbol-120px symbol-lg-160px symbol-fixed position-relative">
            <div class="symbol-label fs-1 fw-bolder bg-primary text-white d-flex align-items-center justify-content-center shadow" 
                 style="width: 130px; height: 130px; font-size: 3.5rem !important; border-radius: 20px; border: 4px solid white;">
              {{ user()?.firstName?.charAt(0) || 'O' }}
            </div>
            
          </div>
        </div>

        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-start flex-wrap mb-2">
            <div class="d-flex flex-column">
              <div class="d-flex align-items-center mb-2">
                <span class="text-gray-900 fs-1 fw-bolder me-3">
                  {{ user()?.firstName }} {{ user()?.lastName }}
                </span>
                
              </div>

              <div class="d-flex flex-wrap fw-semibold fs-6 mb-4 pe-2">
                <span class="d-flex align-items-center text-gray-600 me-5 mb-2">
                  <i class="ki-duotone ki-sms fs-4 me-2 text-primary"></i> 
                  {{ user()?.email }}
                </span>
                
              </div>
            </div>
          </div>

          <div class="d-flex flex-wrap justify-content-start gap-5 pt-3 border-top border-gray-300">
            <div class="border border-gray-300 border-dashed rounded min-w-125px py-3 px-4 me-6 bg-white shadow-sm">
              <div class="d-flex align-items-center">
                <div class="fs-4 fw-bold text-success">Aktif</div>
              </div>
              <div class="fw-semibold fs-7 text-gray-400">Hesap Durumu</div>
            </div>

            
          </div>

        </div>

      </div>
    </div>
  </div>

  

</div>
