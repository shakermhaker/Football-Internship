<div class="auth-card-container" style="width: 650px; max-width: 95vw;">
  
  <div class="text-center mb-8">
    <h2 class="mb-2" style="color: #ff7d00; font-weight: 800; font-size: 2.2rem;">
      Sahaya Katıl! ⚽
    </h2>
    <p style="color: #4b5563; font-weight: 500;">
      Hemen kayıt ol ve rezervasyon yap
    </p>
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onRegisterSubmit()">
    
    <div class="row mb-3">
      <div class="col-md-6">
        <div class="input-wrapper">
          <label>Ad</label>
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/>
          </svg>
          <input type="text" formControlName="firstName" class="auth-input-modern" placeholder="Adınız">
        </div>
      </div>
      
      <div class="col-md-6 mt-3 mt-md-0">
        <div class="input-wrapper">
          <label>Soyad</label>
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/>
          </svg>
          <input type="text" formControlName="lastName" class="auth-input-modern" placeholder="Soyadınız">
        </div>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <div class="input-wrapper">
          <label>Telefon</label>
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.678.678 0 0 0 .178.643l2.457 2.457a.678.678 0 0 0 .644.178l2.189-.547a1.745 1.745 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.634 18.634 0 0 1-7.01-4.42 18.634 18.634 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877L1.885.511z"/>
          </svg>
          <input type="tel" formControlName="phoneNumber" class="auth-input-modern" placeholder="0555 555 55 55">
        </div>
      </div>
      
      <div class="col-md-6 mt-3 mt-md-0">
        <div class="input-wrapper">
          <label>Doğum Tarihi</label>
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/>
          </svg>
          <input type="date" formControlName="birthDate" class="auth-input-modern">
        </div>
      </div>
    </div>

    <div class="input-wrapper mb-3">
      <label>E-Posta</label>
      <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555ZM0 4.697v7.104l5.803-3.558L0 4.697ZM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586l-1.239-.757Zm3.436-.586L16 11.801V4.697l-5.803 3.546Z"/>
      </svg>
      <input type="email" formControlName="email" class="auth-input-modern" placeholder="ornek@mail.com">
    </div>

    <div class="row mb-5">
      <div class="col-md-6">
        <div class="input-wrapper mb-1">
          <label>Şifre</label>
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/>
          </svg>
          <input type="password" formControlName="password" class="auth-input-modern" placeholder="••••••••">
        </div>
        <small style="color: #9ca3af; font-size: 0.8rem; margin-left: 5px;">En az 6 karakter</small>
      </div>
      
      <div class="col-md-6 mt-3 mt-md-0">
        <div class="input-wrapper">
          <label>Şifre Tekrar</label>
          <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/>
          </svg>
          <input type="password" formControlName="confirmPassword" class="auth-input-modern" placeholder="••••••••">
        </div>
      </div>
    </div>

    <button type="submit" [disabled]="registerForm.invalid" class="btn-modern-dark mb-4">
      Kayıt Ol
      <span style="font-size: 1.2rem; line-height: 1;">&raquo;</span>
    </button>

    <div class="text-center mt-3">
      <span style="color: #4b5563; font-size: 0.95rem;">Zaten hesabın var mı?</span>
      <a routerLink="/auth/login" style="color: #10b981; font-weight: 600; text-decoration: none; margin-left: 5px;">Giriş Yap</a>
    </div>

  </form>
</div>
