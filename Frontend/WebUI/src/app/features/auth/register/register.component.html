	<div class="bg-body d-flex flex-column align-items-stretch flex-center rounded-4 w-md-600px p-20 m-10">
						<!--begin::Wrapper-->
						<div class="d-flex flex-center flex-column flex-column-fluid px-lg-10 pb-15 pb-lg-20">
							<!--begin::Form-->
							<form class="form w-100" novalidate="novalidate" [formGroup]="registerForm" (ngSubmit)="onRegisterSubmit()" id="kt_sign_up_form" data-kt-redirect-url="authentication/layouts/creative/sign-in.html" action="#">
								<!--begin::Heading-->
								<div class="text-center mb-11">
									<!--begin::Title-->
									<h1 class="text-gray-900 fw-bolder mb-3">Sign Up</h1>
									<!--end::Title-->
									<!--begin::Subtitle-->
									<div class="text-gray-500 fw-semibold fs-6">Football Field Reservation App</div>
									<!--end::Subtitle=-->
								</div>
								
								
								
							<div class="fv-row mb-8">
        <input type="text" placeholder="First Name" formControlName="firstName" autocomplete="off" class="form-control bg-transparent" />
    </div>

    <div class="fv-row mb-8">
        <input type="text" placeholder="Last Name" formControlName="lastName" autocomplete="off" class="form-control bg-transparent" />
    </div>http://localhost:4200

    <div class="fv-row mb-8">
        <input type="email" placeholder="Email Address" formControlName="email" autocomplete="off" class="form-control bg-transparent" />
        
        <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="text-danger mt-2 fs-7">
            Please enter a valid email address.
        </div>
    </div>
    <div class="fv-row mb-8">
        <input type="text" placeholder="Phone Number" formControlName="phone" autocomplete="off" class="form-control bg-transparent" (input)="onPhoneNumberInput($event)" />
    </div>


    <div class="fv-row mb-8" data-kt-password-meter="true">
        <div class="mb-1">
            <div class="position-relative mb-3">
                <input class="form-control bg-transparent" [type]="isPasswordVisible ? 'text' : 'password'" placeholder="Password" formControlName="password" autocomplete="off" />
                <span class="btn btn-sm btn-icon position-absolute translate-middle top-50 end-0 me-n2" (click)="togglePasswordVisibility()" data-kt-password-meter-control="visibility">
                    <i class="ki-outline fs-2" [ngClass]="isPasswordVisible ? 'ki-eye' : 'ki-eye-slash'"></i>
                    <i class="ki-outline ki-eye fs-2 d-none"></i>
                </span>
            </div>
           
        </div>
        <div class="text-muted">Use 8 or more characters with a mix of letters, numbers & symbols.</div>
    </div>

    <div class="fv-row mb-8">
        <div class="mb-1">
            <div class="position-relative mb-3">
                <input class="form-control bg-transparent" [type]="isConfirmPasswordVisible ? 'text' : 'password'"  placeholder="Repeat Password" formControlName="confirmPassword" autocomplete="off" />
        <span class="btn btn-sm btn-icon position-absolute translate-middle top-50 end-0 me-n2" (click)="toggleConfirmPasswordVisibility()" data-kt-password-meter-control="visibility">
                    <i class="ki-outline fs-2" [ngClass]="isConfirmPasswordVisible ? 'ki-eye' : 'ki-eye-slash'"></i>
                    <i class="ki-outline ki-eye fs-2 d-none"></i>
                </span>

            </div>

        </div>
        

        
        <div *ngIf="(registerForm.hasError('passwordMismatch') || registerForm.get('confirmPassword')?.invalid) && registerForm.get('confirmPassword')?.touched" class="text-danger mt-2 fs-7">
            <span *ngIf="registerForm.get('confirmPassword')?.hasError('required')">Password confirmation is required.</span>
            <span *ngIf="registerForm.hasError('passwordMismatch')">Passwords do not match!</span>
        </div>
    </div>

    
    <div class="d-grid mb-10">
        <button type="submit" [disabled]="registerForm.invalid" class="btn btn-primary">
            Sign Up
        </button>
    </div>

                               
								<!--end::Submit button-->
								
								
							</form>
							<!--end::Form-->
						</div>
                        
						
						</div>
