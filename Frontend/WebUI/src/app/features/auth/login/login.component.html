<div class="auth-card-container">
  
  <div class="text-center mb-8">
    <h2 class="mb-2" style="color: #ff7d00; font-weight: 800; font-size: 2.2rem;">
      Sahaya Çık! 👟
    </h2>
    <p style="color: #4b5563; font-weight: 500;">
      Rezervasyon yapmak için giriş yap
    </p>
  </div>

  <form class="form w-100" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    
    <div class="input-wrapper">
      <label>E-posta</label>
      
      <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555ZM0 4.697v7.104l5.803-3.558L0 4.697ZM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586l-1.239-.757Zm3.436-.586L16 11.801V4.697l-5.803 3.546Z"/>
      </svg>
      
      <input 
        class="auth-input-modern"
        type="email" 
        formControlName="email" 
        autocomplete="off" 
        placeholder="ornek@mail.com" 
      />
    </div>

    <div class="input-wrapper">
      <label>Şifre</label>
      
      <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/>
      </svg>
      
      <input 
        class="auth-input-modern"
        type="password" 
        formControlName="password" 
        autocomplete="off" 
        placeholder="••••••••" 
      />
      
      <svg class="icon-right" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
        <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
      </svg>
    </div>

    <button type="submit" [disabled]="loginForm.invalid" class="btn-modern-dark mb-4">
      Giriş Yap 
      <span style="font-size: 1.2rem; line-height: 1;">&raquo;</span>
    </button>
    
    <div class="text-center mt-3">
      <span style="color: #4b5563; font-size: 0.95rem;">Hesabın yok mu?</span>
      <a routerLink="/auth/register" style="color: #10b981; font-weight: 600; text-decoration: none; margin-left: 5px;">Hemen Kaydol</a>
    </div>

  </form>
</div>
