<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
  
  <div class="bg-white rounded-4 shadow px-4 py-5 text-center" style="width: 100%; max-width: 850px;">
    <h2 class="fw-bolder mb-3" style="color: var(--text-dark);">Sporcularla Spor Merkezlerini Buluşturan Platform!</h2>
    <p class="mb-5" style="color: var(--text-muted);">Hemen Halı Saha bul, rezervasyonunu yap.</p>

    <!-- KESİN ÇÖZÜM: Global CSS değişkenleriyle tanımlanmış bar -->
    <div class="d-flex align-items-center bg-white rounded-pill shadow-sm p-2 search-bar">

    <div class="search-item">
        <i class="bi bi-geo-alt text-success me-2"></i>

        <ng-select
            [items]="cities()"
            bindLabel="name"
            bindValue="id"
            placeholder="Şehir Seç"
            [(ngModel)]="selectedCityId"
            (change)="onCityChange($event)"
            appendTo="body"
            class="modern-select">
        </ng-select>
    </div>

    <div class="vr mx-1"></div>

    <div class="search-item">
        <i class="bi bi-pin-map text-success me-2"></i>

        <ng-select
            [items]="districts()"
            bindLabel="name"
            bindValue="id"
            placeholder="İlçe Seç"
            [(ngModel)]="selectedDistrictId"
            [disabled]="districts().length === 0"
            appendTo="body"
            class="modern-select">
        </ng-select>
    </div>

    <div class="vr mx-1"></div>

    <div class="search-item flex-grow-1">
        <i class="bi bi-search text-muted me-2"></i>

        <input
            type="text"
            [(ngModel)]="searchText"
            class="modern-input"
            placeholder="Saha Adı Ara...">
    </div>
     <div class="vr mx-1"></div>

    <button
        (click)="onSearch()"
        class="btn btn-success rounded-pill ms-2 px-5 h-50px d-flex align-items-center">

        <i class="bi bi-search fs-3 me-2"></i>
        Ara

    </button>

</div>
  </div>
</div>
