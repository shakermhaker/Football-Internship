<div class="container-fluid p-0">
      
  <!-- ÜST KISIM: Başlık ve Ekle Butonu -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bolder text-dark mb-1">Halısahalarım</h2>
      <p class="text-muted">İşletmenize ait tüm sahaları buradan yönetebilirsiniz.</p>
    </div>
    
    <a routerLink="add" class="btn btn-primary shadow-sm fw-bold px-4 py-2 d-flex align-items-center gap-2" style="background-color: var(--accent-orange, #fd7e14); border: none;">
      <i class="fs-4 fw-bold">+</i> Halı Saha Ekle
    </a>
  </div>

  <!-- SAHALARIN LİSTELENDİĞİ KARTLAR -->
  <div class="row g-4">
    
    <!-- Döngüyü burada kuruyoruz ve veriyi 'field' parametresiyle alt component'e yolluyoruz -->
    <div class="col-12 col-md-6 col-lg-4" *ngFor="let fieldItem of myFields">
      
      <!-- İŞTE BURASI! Çiçek gibi tertemiz HTML -->
      <app-myfield-card 
          [field]="fieldItem" 
          (onEdit)="goToEdit($event)" 
          (onDelete)="deleteField($event)">
      </app-myfield-card>

    </div>

    <!-- EĞER HİÇ SAHA YOKSA GÖSTERİLECEK ALAN (Empty State) -->
    <div class="col-12" *ngIf="myFields.length === 0">
      <div class="text-center p-5 bg-white rounded-4 shadow-sm border" style="border-style: dashed !important; border-color: #dee2e6 !important;">
        <div class="fs-1 text-muted mb-3">⚽</div>
        <h4 class="fw-bold text-dark mb-2">Henüz Saha Eklemediniz</h4>
        <p class="text-muted mb-4">Müşterilerin rezervasyon yapabilmesi için hemen ilk sahanızı oluşturun.</p>
        <a routerLink="add" class="btn btn-outline-primary fw-bold px-4">Saha Oluştur</a>
      </div>
    </div>

  </div>
</div>
